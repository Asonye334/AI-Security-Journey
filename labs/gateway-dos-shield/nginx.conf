events { worker_connections 1024; }

http {
    # Define the rate limiting zone based on client IP.
    # 10MB zone ('one') can track ~160,000 unique IP addresses.
    # Rate limit is strictly set to 2 requests per second.
    limit_req_zone $binary_remote_addr zone=one:10m rate=2r/s;

    upstream llm_backend {
        server mock-llm-api:8000;
    }

    server {
        listen 80;

        # Applied rate limiting block
        # burst=3 allows brief spikes up to 3 requests, nodelay rejects excess requests instantly
        limit_req zone=one burst=3 nodelay;

        location / {
            proxy_pass http://llm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
