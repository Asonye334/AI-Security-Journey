version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: ai-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mock-llm-api
    networks:
      - secure-tier

  mock-llm-api:
    build: .
    container_name: mock-llm-backend
    expose:
      - "8000"
    networks:
      - secure-tier

networks:
  secure-tier:
    driver: bridge
